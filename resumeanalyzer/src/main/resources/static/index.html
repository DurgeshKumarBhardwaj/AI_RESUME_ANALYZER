\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Matcher Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 3rem;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.8rem; text-align: center; margin-bottom: 0.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .upload-section {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 1.5rem;
            background: rgba(99, 102, 241, 0.05);
        }

        textarea {
            width: 100%; height: 100px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; padding: 12px; margin-top: 10px; resize: none; font-family: inherit;
        }

        /* Dashboard UI */
        #resultContainer { display: none; margin-top: 2rem; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .dashboard-row { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; }

        .score-badge {
            background: linear-gradient(135deg, var(--success), #059669);
            min-width: 120px; height: 120px; border-radius: 24px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .summary-card {
            background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 16px;
            border-left: 4px solid var(--primary); line-height: 1.6; color: var(--text-dim);
        }

        .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .feedback-card { background: rgba(255,255,255,0.02); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }

        /* Buttons */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer;
            transition: all 0.3s; color: white; font-size: 1rem;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.3); filter: brightness(1.1); }

        #loading { display: none; text-align: center; color: var(--primary); font-weight: bold; margin: 1rem 0; }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>Resume AI <span>Expert</span></h1>
    <p style="text-align:center; color:var(--text-dim); margin-bottom: 2rem;">Professional Placement Audit Tool</p>

    <div id="setupArea">
        <div class="upload-section">
            <input type="file" id="resumeFile" accept="application/pdf" style="color: var(--text-dim);">
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 10px;">Supported format: PDF</p>
        </div>

        <div class="btn-group">
            <button onclick="analyzeGeneral()" style="background: var(--primary);">Quick Audit</button>
            <button onclick="toggleJD()" style="background: var(--accent);">Match with Job</button>
        </div>

        <div id="jdSection" style="display: none; margin-top: 1.5rem;">
            <label style="font-weight: bold; font-size: 0.9rem;">Paste Job Description:</label>
            <textarea id="jobDescription" placeholder="Requirements, Skills, Responsibilities..."></textarea>
            <button onclick="analyzeMatch()" style="background: #1e293b; margin-top: 10px;">Run Comparison</button>
        </div>
    </div>

    <div id="loading">✨ AI is thinking... Please wait...</div>

    <div id="resultContainer">
        <div class="dashboard-row">
            <div class="score-badge">
                <h2 id="displayScore" style="margin:0; font-size: 2.5rem;">0</h2>
                <small style="opacity: 0.8;">Score</small>
            </div>
            <div class="summary-card">
                <strong style="color: var(--primary);">Executive Summary</strong><br>
                <span id="aiSummary"></span>
            </div>
        </div>

        <div class="feedback-grid">
            <div class="feedback-card" style="border-top: 4px solid var(--success);">
                <h4 style="color: var(--success); margin:0 0 10px 0;">✔ Strengths / Matches</h4>
                <ul id="sList" style="color: var(--text-dim); font-size: 0.9rem; padding-left: 20px;"></ul>
            </div>
            <div class="feedback-card" style="border-top: 4px solid var(--danger);">
                <h4 style="color: var(--danger); margin:0 0 10px 0;">⚠ Gaps / Improvements</h4>
                <ul id="iList" style="color: var(--text-dim); font-size: 0.9rem; padding-left: 20px;"></ul>
            </div>
        </div>

        <button onclick="window.location.reload()" style="background: #475569; margin-top: 2rem;">Start New Session</button>
    </div>
</div>

<script>
    function toggleJD() {
        const sec = document.getElementById('jdSection');
        sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
    }

    async function analyzeGeneral() {
        sendRequest('/api/resume/upload', false);
    }

    async function analyzeMatch() {
        sendRequest('/api/resume/compare', true);
    }

    async function sendRequest(url, isMatch) {
        const file = document.getElementById('resumeFile').files[0];
        if(!file) return alert("Please upload a PDF!");

        const formData = new FormData();
        formData.append("file", file);
        if(isMatch) formData.append("jd", document.getElementById('jobDescription').value);

        document.getElementById('loading').style.display = "block";
        document.getElementById('setupArea').style.display = "none";

        try {
            const res = await fetch(url, { method: 'POST', body: formData });
            const data = await res.json();
            const analysis = JSON.parse(data.choices[0].message.content);
            renderDashboard(analysis);
        } catch (e) {
            alert("Error: " + e.message);
            window.location.reload();
        } finally {
            document.getElementById('loading').style.display = "none";
        }
    }

    function renderDashboard(data) {
        document.getElementById('displayScore').innerText = data.score;
        document.getElementById('aiSummary').innerText = data.summary;

        // Handle different keys from different features
        const strengths = data.strengths || data.matching || [];
        const gaps = data.improvements || data.missing || [];

        document.getElementById('sList').innerHTML = strengths.map(s => `<li>${s}</li>`).join('');
        document.getElementById('iList').innerHTML = gaps.map(i => `<li>${i}</li>`).join('');
        document.getElementById('resultContainer').style.display = "block";
    }
</script>
</body>
</html>
